# Netlify configuration.
#
# The dist/ directory is pre-rendered and committed to the repo (every route
# in dist/sitemap.xml has a real index.html with full content baked in,
# generated by `node prerender.mjs` running against `vite preview`).
# Netlify just needs to publish the already-rendered output.

[build]
  # Skip Netlify's automatic build. dist/ is pre-rendered locally and
  # committed - no build step needed.
  command = ""
  publish = "dist"

# SPA fallback: routes that aren't pre-rendered (e.g. /wah/* admin pages)
# fall through to the React shell which then hydrates and routes client-side.
# This matches the existing /dist/_redirects rule.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
