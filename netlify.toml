# Netlify configuration.
#
# The dist/ directory is pre-rendered and committed to the repo (every route
# in dist/sitemap.xml has a real index.html with full content baked in,
# generated by `node prerender.mjs` running against `vite preview`).
# Netlify just needs to publish the already-rendered output.

[build]
  # Skip Netlify's automatic build. dist/ is pre-rendered locally and
  # committed - no build step needed.
  command = ""
  publish = "dist"

# SPA fallback for admin routes that aren't pre-rendered. The React shell
# hydrates and the client-side router handles /wah/login, /wah/dashboard, etc.
[[redirects]]
  from = "/wah/*"
  to = "/index.html"
  status = 200

# Any other URL that doesn't match a pre-rendered file in dist/ returns a real
# 404 (good for SEO - signals removed/invalid pages instead of soft-404).
# Pre-rendered files always take precedence over redirect rules by default.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
