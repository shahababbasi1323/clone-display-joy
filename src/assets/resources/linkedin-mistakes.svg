<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bgM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d1f"/>
      <stop offset="100%" style="stop-color:#121630"/>
    </linearGradient>
  </defs>
  
  <rect width="1080" height="1350" fill="url(#bgM)"/>
  
  <text x="540" y="45" text-anchor="middle" fill="#FF5252" font-family="monospace" font-size="13" letter-spacing="4">SHAHAB ABBASI | SEO STRATEGIST</text>
  
  <text x="540" y="100" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="32" font-weight="bold">7 LinkedIn Mistakes</text>
  <text x="540" y="140" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="32" font-weight="bold">Killing Your Reach</text>
  <text x="540" y="172" text-anchor="middle" fill="#78909C" font-family="Arial" font-size="14">I went from 200 views to 10,000+ views by fixing these</text>
  
  <line x1="350" y1="192" x2="730" y2="192" stroke="#FF5252" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Mistake 1 -->
  <rect x="50" y="215" width="980" height="120" rx="12" fill="#141830"/>
  <rect x="50" y="215" width="6" height="120" rx="3" fill="#FF5252"/>
  <circle cx="100" cy="260" r="20" fill="#FF5252" opacity="0.15"/>
  <text x="100" y="257" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="11" font-weight="bold">BAD</text>
  <text x="100" y="272" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="20">X</text>
  <text x="135" y="252" fill="#FFFFFF" font-family="Arial" font-size="15" font-weight="bold">Starting with "I am excited to share..."</text>
  <text x="135" y="275" fill="#78909C" font-family="Arial" font-size="11">Nobody cares that you are excited. This does not stop the scroll.</text>
  
  <circle cx="685" cy="260" r="20" fill="#4CAF50" opacity="0.15"/>
  <text x="685" y="267" text-anchor="middle" fill="#4CAF50" font-family="Arial" font-size="20">O</text>
  <text x="720" y="252" fill="#4CAF50" font-family="Arial" font-size="14" font-weight="bold">FIX: Start with a pain point or bold claim</text>
  <text x="720" y="275" fill="#78909C" font-family="Arial" font-size="11">"Stop doing X. Here is why:" or "Hot take: [bold opinion]"</text>
  
  <text x="540" y="322" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="10">IMPACT: Weak hooks = 90% of readers never click "See more"</text>
  
  <!-- Mistake 2 -->
  <rect x="50" y="345" width="980" height="120" rx="12" fill="#141830"/>
  <rect x="50" y="345" width="6" height="120" rx="3" fill="#FF5252"/>
  <circle cx="100" cy="390" r="20" fill="#FF5252" opacity="0.15"/>
  <text x="100" y="387" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="11" font-weight="bold">BAD</text>
  <text x="100" y="402" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="20">X</text>
  <text x="135" y="382" fill="#FFFFFF" font-family="Arial" font-size="15" font-weight="bold">Writing one giant paragraph</text>
  <text x="135" y="405" fill="#78909C" font-family="Arial" font-size="11">Walls of text are unreadable on mobile. People scroll past immediately.</text>
  
  <circle cx="685" cy="390" r="20" fill="#4CAF50" opacity="0.15"/>
  <text x="685" y="397" text-anchor="middle" fill="#4CAF50" font-family="Arial" font-size="20">O</text>
  <text x="720" y="382" fill="#4CAF50" font-family="Arial" font-size="14" font-weight="bold">FIX: Single-line sentences. White space.</text>
  <text x="720" y="405" fill="#78909C" font-family="Arial" font-size="11">One idea per line. Short sentences. Let content breathe.</text>
  
  <text x="540" y="452" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="10">IMPACT: Short lines get 2.5x more dwell time than paragraph blocks</text>
  
  <!-- Mistake 3 -->
  <rect x="50" y="475" width="980" height="120" rx="12" fill="#141830"/>
  <rect x="50" y="475" width="6" height="120" rx="3" fill="#FF5252"/>
  <circle cx="100" cy="520" r="20" fill="#FF5252" opacity="0.15"/>
  <text x="100" y="517" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="11" font-weight="bold">BAD</text>
  <text x="100" y="532" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="20">X</text>
  <text x="135" y="512" fill="#FFFFFF" font-family="Arial" font-size="15" font-weight="bold">Using 10+ hashtags</text>
  <text x="135" y="535" fill="#78909C" font-family="Arial" font-size="11">LinkedIn penalizes posts with 3+ hashtags. You are hurting yourself.</text>
  
  <circle cx="685" cy="520" r="20" fill="#4CAF50" opacity="0.15"/>
  <text x="685" y="527" text-anchor="middle" fill="#4CAF50" font-family="Arial" font-size="20">O</text>
  <text x="720" y="512" fill="#4CAF50" font-family="Arial" font-size="14" font-weight="bold">FIX: Use 1-2 highly relevant hashtags</text>
  <text x="720" y="535" fill="#78909C" font-family="Arial" font-size="11">#SEO #LocalSEO - specific, niche, targeted.</text>
  
  <text x="540" y="582" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="10">IMPACT: 3+ hashtags reduces reach by up to 40% (LinkedIn 2026 data)</text>
  
  <!-- Mistake 4 -->
  <rect x="50" y="605" width="980" height="120" rx="12" fill="#141830"/>
  <rect x="50" y="605" width="6" height="120" rx="3" fill="#FF5252"/>
  <circle cx="100" cy="650" r="20" fill="#FF5252" opacity="0.15"/>
  <text x="100" y="647" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="11" font-weight="bold">BAD</text>
  <text x="100" y="662" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="20">X</text>
  <text x="135" y="642" fill="#FFFFFF" font-family="Arial" font-size="15" font-weight="bold">Posting links in the main post</text>
  <text x="135" y="665" fill="#78909C" font-family="Arial" font-size="11">External links get 40% less reach. LinkedIn wants to keep people ON LinkedIn.</text>
  
  <circle cx="685" cy="650" r="20" fill="#4CAF50" opacity="0.15"/>
  <text x="685" y="657" text-anchor="middle" fill="#4CAF50" font-family="Arial" font-size="20">O</text>
  <text x="720" y="642" fill="#4CAF50" font-family="Arial" font-size="14" font-weight="bold">FIX: Put links in the FIRST comment</text>
  <text x="720" y="665" fill="#78909C" font-family="Arial" font-size="11">Post text-only. Drop link in comments. Mention "link in comments."</text>
  
  <text x="540" y="712" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="10">IMPACT: Text-only posts get 40-50% MORE impressions than link posts</text>
  
  <!-- Mistake 5 -->
  <rect x="50" y="735" width="980" height="120" rx="12" fill="#141830"/>
  <rect x="50" y="735" width="6" height="120" rx="3" fill="#FF5252"/>
  <circle cx="100" cy="780" r="20" fill="#FF5252" opacity="0.15"/>
  <text x="100" y="777" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="11" font-weight="bold">BAD</text>
  <text x="100" y="792" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="20">X</text>
  <text x="135" y="772" fill="#FFFFFF" font-family="Arial" font-size="15" font-weight="bold">No CTA (Call to Action)</text>
  <text x="135" y="795" fill="#78909C" font-family="Arial" font-size="11">If you do not tell people what to do, they do nothing. Zero engagement.</text>
  
  <circle cx="685" cy="780" r="20" fill="#4CAF50" opacity="0.15"/>
  <text x="685" y="787" text-anchor="middle" fill="#4CAF50" font-family="Arial" font-size="20">O</text>
  <text x="720" y="772" fill="#4CAF50" font-family="Arial" font-size="14" font-weight="bold">FIX: Every post needs a clear CTA</text>
  <text x="720" y="795" fill="#78909C" font-family="Arial" font-size="11">"Comment X" / "DM me" / "Save this" / "Follow for more"</text>
  
  <text x="540" y="842" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="10">IMPACT: Posts with clear CTAs get 3x more comments</text>
  
  <!-- Mistake 6 -->
  <rect x="50" y="865" width="980" height="120" rx="12" fill="#141830"/>
  <rect x="50" y="865" width="6" height="120" rx="3" fill="#FF5252"/>
  <circle cx="100" cy="910" r="20" fill="#FF5252" opacity="0.15"/>
  <text x="100" y="907" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="11" font-weight="bold">BAD</text>
  <text x="100" y="922" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="20">X</text>
  <text x="135" y="902" fill="#FFFFFF" font-family="Arial" font-size="15" font-weight="bold">Only talking about yourself</text>
  <text x="135" y="925" fill="#78909C" font-family="Arial" font-size="11">"I got promoted" "I won an award" - nobody follows you for YOUR news.</text>
  
  <circle cx="685" cy="910" r="20" fill="#4CAF50" opacity="0.15"/>
  <text x="685" y="917" text-anchor="middle" fill="#4CAF50" font-family="Arial" font-size="20">O</text>
  <text x="720" y="902" fill="#4CAF50" font-family="Arial" font-size="14" font-weight="bold">FIX: Lead with value for THEM</text>
  <text x="720" y="925" fill="#78909C" font-family="Arial" font-size="11">Teach something. Share a tip. Solve a problem. Their benefit first.</text>
  
  <text x="540" y="972" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="10">IMPACT: Value-first posts get 5x more followers than self-promotion</text>
  
  <!-- Mistake 7 -->
  <rect x="50" y="995" width="980" height="120" rx="12" fill="#141830"/>
  <rect x="50" y="995" width="6" height="120" rx="3" fill="#FF5252"/>
  <circle cx="100" cy="1040" r="20" fill="#FF5252" opacity="0.15"/>
  <text x="100" y="1037" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="11" font-weight="bold">BAD</text>
  <text x="100" y="1052" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="20">X</text>
  <text x="135" y="1032" fill="#FFFFFF" font-family="Arial" font-size="15" font-weight="bold">Posting and disappearing</text>
  <text x="135" y="1055" fill="#78909C" font-family="Arial" font-size="11">You post then check back 8 hours later. Algorithm already buried you.</text>
  
  <circle cx="685" cy="1040" r="20" fill="#4CAF50" opacity="0.15"/>
  <text x="685" y="1047" text-anchor="middle" fill="#4CAF50" font-family="Arial" font-size="20">O</text>
  <text x="720" y="1032" fill="#4CAF50" font-family="Arial" font-size="14" font-weight="bold">FIX: Reply to ALL comments in first hour</text>
  <text x="720" y="1055" fill="#78909C" font-family="Arial" font-size="11">First 60-90 minutes are critical. Comments = algorithm fuel.</text>
  
  <text x="540" y="1102" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="10">IMPACT: Active engagement in first hour = 3x more total reach</text>
  
  <!-- Results -->
  <rect x="50" y="1135" width="980" height="70" rx="12" fill="#1a1e38" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="260" y="1178" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14">Before fixing: <tspan fill="#FF5252" font-weight="bold">200 views/post</tspan></text>
  <text x="540" y="1178" text-anchor="middle" fill="#78909C" font-family="Arial" font-size="22">--></text>
  <text x="810" y="1178" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14">After fixing: <tspan fill="#4CAF50" font-weight="bold">10,000+ views/post</tspan></text>
  
  <!-- CTA -->
  <rect x="50" y="1230" width="980" height="80" rx="14" fill="#1a1e38" stroke="#FF5252" stroke-width="1.5"/>
  <text x="540" y="1265" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="18" font-weight="bold">Which Mistake Are You Guilty Of? Comment Below!</text>
  <text x="540" y="1290" text-anchor="middle" fill="#B0BEC5" font-family="Arial" font-size="12">Follow @ShahabAbbasi302 for LinkedIn + SEO strategies | shahababbasi.com</text>
  
  <rect x="0" y="1335" width="1080" height="15" fill="#FF5252" opacity="0.3"/>
</svg>