  <text x="145" y="787" fill="#FF6D00" font-family="Arial" font-size="20" font-weight="bold">THE CTA (Comment Trigger)</text>
  <text x="145" y="810" fill="#B0BEC5" font-family="Arial" font-size="12">One simple action. Low barrier. High reward.</text>
  
  <text x="90" y="840" fill="#FFFFFF" font-family="monospace" font-size="11">"Comment 'META' below and I will send you the full PDF."</text>
  
  <text x="90" y="868" fill="#78909C" font-family="Arial" font-size="11">WHY IT WORKS: Easy action (one word). Promise of more value.</text>
  <text x="90" y="887" fill="#78909C" font-family="Arial" font-size="11">Comments boost algorithm. Each commenter becomes a lead.</text>
  
