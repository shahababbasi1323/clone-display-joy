  <text x="442" y="1175" text-anchor="middle" fill="#4CAF50" font-family="Arial" font-size="14" font-weight="bold">VALUE</text>
  <text x="442" y="1195" text-anchor="middle" fill="#4CAF50" font-family="Arial" font-size="10">Give real content</text>
  
