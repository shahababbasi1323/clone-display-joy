  <!-- Step 1: HOOK -->
  <rect x="60" y="220" width="960" height="155" rx="12" fill="#141830" stroke="#FF5252" stroke-width="1.5"/>
  <circle cx="110" cy="260" r="22" fill="#FF5252" opacity="0.2"/>
  <text x="110" y="267" text-anchor="middle" fill="#FF5252" font-family="Arial" font-size="18" font-weight="bold">1</text>
  <text x="145" y="262" fill="#FF5252" font-family="Arial" font-size="20" font-weight="bold">THE HOOK (First 2 Lines)</text>
  <text x="145" y="285" fill="#B0BEC5" font-family="Arial" font-size="12">This is the ONLY thing people see before clicking "See more"</text>
  
  <text x="90" y="315" fill="#FFFFFF" font-family="monospace" font-size="11">"Stop writing meta descriptions one by one."</text>
  
  <text x="90" y="343" fill="#78909C" font-family="Arial" font-size="11">WHY IT WORKS: Calls out a specific pain point. Creates curiosity gap.</text>
  <text x="90" y="362" fill="#78909C" font-family="Arial" font-size="11">Forces the reader to click "See more" to find out the alternative.</text>
  
  <!-- Step 2: VALUE -->
