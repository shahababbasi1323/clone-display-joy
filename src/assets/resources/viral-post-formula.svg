  <text x="932" y="1175" text-anchor="middle" fill="#FF6D00" font-family="Arial" font-size="14" font-weight="bold">CTA</text>
  <text x="932" y="1195" text-anchor="middle" fill="#FF6D00" font-family="Arial" font-size="10">Capture leads</text>
  
