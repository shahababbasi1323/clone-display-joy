  <text x="145" y="437" fill="#4CAF50" font-family="Arial" font-size="20" font-weight="bold">THE VALUE (Body - Real Content)</text>
  <text x="145" y="460" fill="#B0BEC5" font-family="Arial" font-size="12">Give the ACTUAL value. Not a teaser. The real thing.</text>
  
  <text x="90" y="490" fill="#FFFFFF" font-family="monospace" font-size="11">Share the actual ChatGPT prompt, the real strategy, the exact steps.</text>
  <text x="90" y="510" fill="#FFFFFF" font-family="monospace" font-size="11">People can use it IMMEDIATELY. No strings attached.</text>
  
  <text x="90" y="538" fill="#78909C" font-family="Arial" font-size="11">WHY IT WORKS: Generosity builds trust. People share useful content.</text>
  
