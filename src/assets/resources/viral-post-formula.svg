  <text x="835" y="1035" text-anchor="middle" fill="#B0BEC5" font-family="Arial" font-size="13">Revenue</text>
  
  <text x="540" y="1085" text-anchor="middle" fill="#78909C" font-family="Arial" font-size="12">From ONE LinkedIn post using this exact formula</text>
  <text x="540" y="1105" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="bold">Pain Point Hook + Real Value + Specific Proof + Easy CTA = Leads</text>
  
